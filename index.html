<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Näsijärvi Kartta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body, html { margin:0; padding:0; height:100%; }
  #map { height:100%; width:100%; }
  .infoBox {
    position:absolute; top:10px; left:10px;
    background:white; padding:10px; border-radius:8px;
    font-family:sans-serif; box-shadow:0 0 10px rgba(0,0,0,0.2);
    z-index:9999;
    width:200px;
  }
</style>
</head>
<body>

<div class="infoBox" id="infoBox">
  Nopeus: 0 km/h<br>
  Reitti: valitse 2 pistettä<br>
  (1. napautus = Mistä, 2. napautus = Minne)
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Kartta
var map = L.map('map').setView([61.507, 23.760], 12);

// Peruskartta
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// SYVYYSKARTTA (OpenSeaMap)
L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
  maxZoom: 18,
  opacity: 0.8
}).addTo(map);

// SYVYYSVARJOSTUS (OpenDepth)
L.tileLayer('https://tiles.openseamap.org/bathymetry/{z}/{x}/{y}.png', {
  maxZoom: 18,
  opacity: 0.6
}).addTo(map);

// Reittipisteet
var startPoint = null;
var endPoint = null;

// Reittiviiva
var autoRoute = L.polyline([], {color: 'blue', weight: 4}).addTo(map);

// Klikkaus: valitse Mistä ja Minne
map.on('click', function(e){
  if (!startPoint) {
    startPoint = e.latlng;
  } else if (!endPoint) {
    endPoint = e.latlng;
    calculateRoute();
  } else {
    // Reset
    startPoint = e.latlng;
    endPoint = null;
    autoRoute.setLatLngs([]);
  }
  updateInfoBox(lastSpeed);
});

// Reittilaskenta (suora väyläviiva)
function calculateRoute(){
  if (!startPoint || !endPoint) return;

  var route = [
    [startPoint.lat, startPoint.lng],
    [endPoint.lat, endPoint.lng]
  ];

  autoRoute.setLatLngs(route);
}

// GPS sijainti + nopeus
map.locate({setView:true, maxZoom:14, watch:true});
var marker = L.marker([0,0]).addTo(map);

var lastSpeed = 0;

map.on('locationfound', function(e){
  marker.setLatLng(e.latlng);

  if (e.speed !== null) {
    lastSpeed = (e.speed * 3.6).toFixed(1);
  }

  updateInfoBox(lastSpeed);
});

// InfoBox päivitys
function updateInfoBox(speed){
  const box = document.getElementById("infoBox");
  box.innerHTML =
    "Nopeus: " + speed + " km/h<br>" +
    "Reitti: " + (startPoint ? "Mistä OK" : "valitse") +
    (endPoint ? ", Minne OK" : "") + "<br>" +
    "(Napauta karttaa 2 kertaa)";
}
</script>

</body>
</html>
