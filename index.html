<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Näsijärvi Kartta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body, html { margin:0; padding:0; height:100%; }
  #map { height:100%; width:100%; }
  .infoBox {
    position:absolute; top:10px; left:10px;
    background:white; padding:10px; border-radius:8px;
    font-family:sans-serif; box-shadow:0 0 10px rgba(0,0,0,0.2);
    z-index:9999;
    width:150px;
  }
</style>
</head>
<body>

<div class="infoBox" id="infoBox">
  Tuuli ladataan...<br>
  Nopeus: 0 km/h
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Kartta
var map = L.map('map').setView([61.507, 23.760], 12);

// Taustakartta
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// GPS sijainti + nopeus
map.locate({setView:true, maxZoom:14, watch:true});
var marker = L.marker([0,0]).addTo(map);

map.on('locationfound', function(e){
  marker.setLatLng(e.latlng);

  // Nopeus m/s → km/h
  let speed = 0;
  if (e.speed !== null) {
    speed = (e.speed * 3.6).toFixed(1); 
  }

  updateInfoBox(speed);
});

// Päivitä infoBox
function updateInfoBox(speed){
  const box = document.getElementById("infoBox");
  box.innerHTML = 
    "Tuuli: " + currentWind + "<br>" +
    "Nopeus: " + speed + " km/h";
}

// Tuulitiedot FMI
let currentWind = "ladataan...";

async function fetchWind(){
  const url = "https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::weather::simple&fmisid=101004"; 
  const res = await fetch(url);
  const text = await res.text();
  const speedMatch = text.match(/ws_10min" value="(.+?)"/);
  const dirMatch = text.match(/wd_10min" value="(.+?)"/);

  if(speedMatch && dirMatch){
    const speed = speedMatch[1];
    const dir = dirMatch[1];
    currentWind = speed + " m/s (" + dir + "°)";
  } else {
    currentWind = "ei dataa";
  }

  updateInfoBox(0);
}

fetchWind();
setInterval(fetchWind, 60000);
</script>

</body>
</html>
